<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b0b0d">
<title>MasterKit Admin</title>
<style>
:root{
  --bg:#09090b;--card:#151517;--card2:#1b1b1e;--line:#2b2b30;
  --text:#f6f6f7;--muted:#98989f;--gold:#ffb300;--gold2:#ffca28;
  --danger:#ef5350;--ok:#43a047;--radius:18px
}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{background:
radial-gradient(circle at 50% -10%,rgba(255,179,0,.18),transparent 32%),
linear-gradient(180deg,#0b0b0d,#080809)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{width:min(960px,94%);margin:auto;padding:22px 0 100px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:54px;height:54px;border:2px solid rgba(255,179,0,.42);border-radius:17px;
display:grid;place-items:center;color:var(--gold);font-size:30px;font-weight:900;background:#171719;
box-shadow:0 0 0 5px rgba(255,179,0,.05)}
.brand h1{margin:0;font-size:26px;line-height:1.05}.brand p{margin:5px 0 0;color:var(--muted);font-size:13px}
.card{background:linear-gradient(180deg,#19191b,#121214);border:1px solid var(--line);
border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 16px 50px rgba(0,0,0,.28)}
.login{max-width:480px;margin:60px auto}
.eyebrow{color:var(--gold);letter-spacing:.25em;font-weight:900;font-size:12px}
h2{margin:8px 0 6px;font-size:24px}.muted{color:var(--muted)}
label{display:block;margin:14px 0 7px;color:#b8b8bd;font-size:12px;font-weight:800;text-transform:uppercase}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;
background:#0d0d0f;color:var(--text);outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,179,0,.12)}
textarea{min-height:110px;resize:vertical}
.btn{border:0;border-radius:13px;padding:11px 15px;font-weight:850;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#171000}
.btn.secondary{background:#202024;color:#fff;border:1px solid #34343a}
.btn.danger{background:var(--danger);color:#fff}.btn.ok{background:var(--ok);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.actions{display:flex;gap:9px;flex-wrap:wrap}.actions .btn{min-width:110px}
.status{margin-top:13px;padding:12px 14px;border-radius:13px;background:#0c0c0e;border:1px solid var(--line);
white-space:pre-wrap;color:#d7d7da;font-size:13px}
.tabs{display:flex;gap:8px;overflow:auto;padding:8px 0 14px;scrollbar-width:none}
.tab{white-space:nowrap;border:1px solid var(--line);background:#171719;color:#bbb;padding:10px 14px;border-radius:999px;font-weight:800}
.tab.active{background:var(--gold);color:#181000;border-color:var(--gold)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:#141416;border:1px solid var(--line);border-radius:16px;padding:14px}
.stat b{font-size:25px;color:var(--gold);display:block}.stat span{font-size:11px;color:var(--muted);text-transform:uppercase}
.toolbar{display:grid;grid-template-columns:1fr auto auto;gap:9px;align-items:center}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.item{background:#151517;border:1px solid var(--line);border-radius:17px;overflow:hidden}
.thumb{aspect-ratio:3/4;background:#0d0d0f;display:grid;place-items:center;color:#696970;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;object-position:center top}
.meta{padding:12px}.name{font-weight:900;line-height:1.25}.sub{color:var(--muted);font-size:12px;margin-top:5px;min-height:18px}
.badge{display:inline-block;margin-bottom:8px;border:1px solid rgba(255,179,0,.35);color:var(--gold);
background:rgba(255,179,0,.08);border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}
.itemActions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}
.itemActions .btn{padding:9px 7px;font-size:12px}.itemActions .danger{grid-column:1/-1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;
padding:14px;z-index:99}.modalBox{width:min(700px,100%);max-height:92vh;overflow:auto;background:#151517;
border:1px solid #333;border-radius:22px;padding:18px}
.modalHead{display:flex;justify-content:space-between;align-items:center;gap:10px}
.modalHead h2{margin:0}.field{margin-top:10px}.fieldRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.fieldRow .btn{padding:10px}
.preview{height:190px;border:1px solid var(--line);border-radius:14px;margin-top:12px;overflow:hidden;
display:grid;place-items:center;color:var(--muted);background:#0c0c0e}
.preview img{width:100%;height:100%;object-fit:cover;object-position:center top}
.raw{min-height:420px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}
.bottom{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:min(650px,94%);
display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px;background:rgba(16,16,18,.94);
border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(12px);z-index:40}
.bottom button{border:0;background:transparent;color:#aaa;padding:10px 3px;font-weight:800;font-size:11px;border-radius:12px}
.bottom button.active{background:rgba(255,179,0,.15);color:var(--gold)}
@media(max-width:650px){
 .top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:repeat(3,1fr)}
 .toolbar{grid-template-columns:1fr}.list{grid-template-columns:repeat(2,1fr);gap:9px}
 .actions .btn{flex:1}.bottom{grid-template-columns:repeat(5,1fr)}
 .brand h1{font-size:23px}.meta{padding:9px}.name{font-size:13px}
}
@media(max-width:370px){.list{grid-template-columns:1fr 1fr}.bottom button{font-size:10px}}
</style>
</head>
<body>

<section id="loginPage" class="app">
  <div class="card login">
    <div class="eyebrow">MASTERKIT</div>
    <h2>MasterKit Admin</h2>
    <p class="muted">Token is optional for viewing. It is required only when publishing changes.</p>
    <label>GitHub username</label>
    <input id="username" value="missnapokita" autocomplete="username">
    <label>Fine-grained GitHub token</label>
    <input id="token" type="password" placeholder="github_pat_..." autocomplete="current-password">
    <button id="enterBtn" class="btn" style="width:100%;margin-top:16px">Enter Dashboard</button>
    <div id="loginStatus" class="status">Ready.</div>
  </div>
</section>

<section id="dashboard" class="app hidden">
  <header class="top">
    <div class="brand"><div class="logo">M</div><div><h1>MasterKit Admin</h1><p id="welcome">GitHub JSON manager</p></div></div>
    <div class="actions"><button class="btn secondary" id="reloadBtn">Reload</button><button class="btn secondary" id="logoutBtn">Logout</button></div>
  </header>

  <div id="tabs" class="tabs"></div>

  <div class="card">
    <div class="actions">
      <button class="btn" id="loadBtn">Load JSON</button>
      <button class="btn" id="publishBtn">Publish</button>
      <button class="btn secondary" id="rawBtn">Raw JSON</button>
      <button class="btn secondary" id="backupBtn">Backup</button>
      <button class="btn secondary" id="discardBtn">Discard / Reload</button>
    </div>
    <div id="status" class="status">Choose a dataset.</div>
  </div>

  <div class="stats">
    <div class="stat"><b id="total">0</b><span>Total items</span></div>
    <div class="stat"><b id="shown">0</b><span>Shown</span></div>
    <div class="stat"><b id="changes">0</b><span>Changes</span></div>
  </div>

  <div class="card">
    <div class="toolbar">
      <input id="search" placeholder="Search all fields...">
      <button class="btn" id="addBtn">+ Add</button>
      <button class="btn secondary" id="sortBtn">Sort A–Z</button>
    </div>
  </div>

  <div id="list" class="list"></div>
</section>

<nav id="bottom" class="bottom hidden"></nav>

<div id="editModal" class="modal hidden">
  <div class="modalBox">
    <div class="modalHead"><h2 id="editTitle">Edit Item</h2><button class="btn secondary" id="closeEdit">Close</button></div>
    <div id="fields"></div>
    <button class="btn secondary" id="addFieldBtn" style="margin-top:12px">+ Custom Field</button>
    <div id="preview" class="preview">Image preview</div>
    <div class="actions" style="margin-top:14px"><button class="btn" id="saveEdit">Save Local</button><button class="btn secondary" id="cancelEdit">Cancel</button></div>
  </div>
</div>

<div id="rawModal" class="modal hidden">
  <div class="modalBox">
    <div class="modalHead"><h2>Raw JSON</h2><button class="btn secondary" id="closeRaw">Close</button></div>
    <textarea id="rawBox" class="raw"></textarea>
    <button class="btn" id="applyRaw" style="margin-top:12px">Apply Locally</button>
  </div>
</div>

<script>
"use strict";

const DATASETS = {
  version: {
    label:"Version", owner:"missnapokita", repo:"masterkiter", branch:"main", path:"version.json",
    raw:"https://raw.githubusercontent.com/missnapokita/masterkiter/main/version.json", root:"object",
    defaults:{version_code:1,version_name:"1.0.0",title:"MasterKit Update Available",message:"",changelog:[],download_url:"",update_size:"",force_update:false}
  },
  skins: {
    label:"Skins", owner:"missnapokita", repo:"masterkiter", branch:"main", path:"skins.json",
    raw:"https://raw.githubusercontent.com/missnapokita/masterkiter/main/skins.json", root:"array",
    defaults:{id:"",hero_name:"",skin_name:"",image:"",script:"",enabled:true}
  },
  upgrades: {
    label:"Upgrades", owner:"missnapokita", repo:"masterkiter", branch:"main", path:"skin_upgrades.json",
    raw:"https://raw.githubusercontent.com/missnapokita/masterkiter/main/skin_upgrades.json", root:"array",
    defaults:{id:"",hero:"",base_name:"",base_image:"",backup_script:"",enabled:true,targets:[],skin_tags:[]}
  },
  suggested: {
    label:"Suggested", owner:"missnapokita", repo:"hero.json", branch:"main", path:"suggested.json",
    raw:"https://raw.githubusercontent.com/missnapokita/hero.json/main/suggested.json", root:"array",
    defaults:{hero_name:"",skin_name:"",image:""}
  },
  preparations: {
    label:"Preparations", owner:"missnapokita", repo:"hero.json", branch:"main", path:"preparations.json",
    raw:"https://raw.githubusercontent.com/missnapokita/hero.json/main/preparations.json", root:"array",
    defaults:{name:"",image:"",script:"",tags:"recall",enabled:true}
  }
};

const $ = id => document.getElementById(id);
let currentKey="skins", data=[], original=[], sha="", changed=0, editIndex=-1, rootWasObject=false;

function safeGet(k,d=""){try{return localStorage.getItem(k)??d}catch(e){return d}}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function setStatus(msg){$("status").textContent=msg}
function token(){return $("token").value.trim() || safeGet("mk_token","")}
function username(){return $("username").value.trim() || "missnapokita"}
function ds(){return DATASETS[currentKey]}
function headers(){const h={"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};if(token())h.Authorization="Bearer "+token();return h}
function apiUrl(){const d=ds();return `https://api.github.com/repos/${d.owner}/${d.repo}/contents/${d.path}`}
function encode64(s){const bytes=new TextEncoder().encode(s);let b="";bytes.forEach(x=>b+=String.fromCharCode(x));return btoa(b)}
function decode64(s){const b=atob(String(s).replace(/\n/g,""));return new TextDecoder().decode(Uint8Array.from(b,c=>c.charCodeAt(0)))}
function valueType(v){if(Array.isArray(v))return"array";if(v===null)return"null";return typeof v}
function displayValue(v){return (typeof v==="object"&&v!==null)?JSON.stringify(v,null,2):String(v??"")}
function parseTyped(text,type){
  if(type==="boolean")return String(text).toLowerCase()==="true";
  if(type==="number"){const n=Number(text);if(Number.isNaN(n))throw new Error("Invalid number");return n}
  if(type==="array"||type==="object"){const v=JSON.parse(text|| (type==="array"?"[]":"{}"));if(type==="array"&&!Array.isArray(v))throw new Error("Expected JSON array");if(type==="object"&&(Array.isArray(v)||typeof v!=="object"||v===null))throw new Error("Expected JSON object");return v}
  if(type==="null")return null;
  return text;
}

function init(){
  $("username").value=safeGet("mk_username","missnapokita");
  $("token").value=safeGet("mk_token","");
  buildTabs();
  bind();
  $("loginStatus").textContent="Ready. Token is optional until Publish.";
}
function bind(){
  $("enterBtn").addEventListener("click",enter);
  $("logoutBtn").addEventListener("click",logout);
  $("reloadBtn").addEventListener("click",loadData);
  $("loadBtn").addEventListener("click",loadData);
  $("publishBtn").addEventListener("click",publish);
  $("rawBtn").addEventListener("click",openRaw);
  $("backupBtn").addEventListener("click",backup);
  $("discardBtn").addEventListener("click",()=>{if(confirm("Discard local changes and reload?"))loadData()});
  $("search").addEventListener("input",render);
  $("addBtn").addEventListener("click",addItem);
  $("sortBtn").addEventListener("click",sortItems);
  $("closeEdit").addEventListener("click",closeEdit);
  $("cancelEdit").addEventListener("click",closeEdit);
  $("saveEdit").addEventListener("click",saveEdit);
  $("addFieldBtn").addEventListener("click",addCustomField);
  $("closeRaw").addEventListener("click",()=>$("rawModal").classList.add("hidden"));
  $("applyRaw").addEventListener("click",applyRaw);
}
function enter(){
  safeSet("mk_username",username()); if($("token").value.trim())safeSet("mk_token",$("token").value.trim());
  $("loginPage").classList.add("hidden");$("dashboard").classList.remove("hidden");$("bottom").classList.remove("hidden");
  $("welcome").textContent="Logged in as @"+username();
  selectDataset(safeGet("mk_dataset","skins"),true);
}
function logout(){
  $("dashboard").classList.add("hidden");$("bottom").classList.add("hidden");$("loginPage").classList.remove("hidden");
}
function buildTabs(){
  $("tabs").innerHTML="";$("bottom").innerHTML="";
  Object.entries(DATASETS).forEach(([k,d])=>{
    const a=document.createElement("button");a.className="tab";a.textContent=d.label;a.onclick=()=>selectDataset(k,true);a.dataset.key=k;$("tabs").appendChild(a);
    const b=document.createElement("button");b.textContent=d.label;b.onclick=()=>selectDataset(k,true);b.dataset.key=k;$("bottom").appendChild(b);
  });
}
function selectDataset(k,autoload=false){
  if(!DATASETS[k])k="skins";currentKey=k;safeSet("mk_dataset",k);
  document.querySelectorAll("[data-key]").forEach(x=>x.classList.toggle("active",x.dataset.key===k));
  data=[];original=[];sha="";changed=0;updateStats();render();
  setStatus(`${ds().label}\n${ds().owner}/${ds().repo}/${ds().path}`);
  if(autoload)loadData();
}
async function loadData(){
  setStatus("Loading "+ds().label+"...");
  try{
    let parsed, apiData=null;
    try{
      const r=await fetch(ds().raw+"?t="+Date.now(),{cache:"no-store"});
      if(!r.ok)throw new Error("Raw HTTP "+r.status);
      parsed=await r.json();
    }catch(rawErr){
      const r=await fetch(apiUrl()+"?ref="+encodeURIComponent(ds().branch)+"&t="+Date.now(),{headers:headers(),cache:"no-store"});
      apiData=await r.json();if(!r.ok)throw new Error(apiData.message||"GitHub API load failed");
      parsed=JSON.parse(decode64(apiData.content));sha=apiData.sha||"";
    }
    rootWasObject=!Array.isArray(parsed);
    data=Array.isArray(parsed)?parsed:[parsed];
    original=clone(data);changed=0;
    if(!sha){try{const r=await fetch(apiUrl()+"?ref="+encodeURIComponent(ds().branch),{headers:headers(),cache:"no-store"});const j=await r.json();if(r.ok)sha=j.sha||""}catch(e){}}
    updateStats();render();setStatus(`Loaded ${data.length} item(s) from ${ds().path}.`);
  }catch(e){setStatus("Load error: "+e.message)}
}
function titleOf(o){
  if(currentKey==="version")return o.title||o.version_name||"Version";
  if(currentKey==="upgrades")return o.base_name||o.hero||o.id||"Upgrade";
  if(currentKey==="preparations")return o.name||o.title||"Preparation";
  return o.hero_name||o.skin_name||o.name||o.title||o.id||"Item";
}
function subOf(o){
  if(currentKey==="version")return `${o.version_name||""} • code ${o.version_code??""}`;
  if(currentKey==="upgrades")return `${o.hero||""} • ${(o.targets||[]).length} target(s)`;
  if(currentKey==="preparations")return Array.isArray(o.tags)?o.tags.join(", "):(o.tags||o.type||"");
  return o.skin_name||o.hero_name||o.id||"";
}
function imageOf(o){return o.image||o.base_image||o.image_url||o.thumbnail||o.poster||""}
function badgeOf(o){
  if(currentKey==="version")return"UPDATE";
  if(currentKey==="upgrades")return"UPGRADE";
  if(currentKey==="preparations"){const t=Array.isArray(o.tags)?o.tags.join(" "):String(o.tags||"");return t.toLowerCase().includes("emote")?"EMOTE":"RECALL"}
  if(currentKey==="suggested")return"SUGGESTED";
  return"SKIN";
}
function render(){
  const q=$("search").value.toLowerCase().trim();$("list").innerHTML="";let shown=0;
  data.forEach((o,i)=>{
    if(q&&!JSON.stringify(o).toLowerCase().includes(q))return;shown++;
    const card=document.createElement("article");card.className="item";
    const img=imageOf(o);
    card.innerHTML=`<div class="thumb">${img?`<img src="${esc(img)}" loading="lazy" onerror="this.remove();this.parentElement.textContent='Image failed'">`:"No image"}</div>
      <div class="meta"><span class="badge">${esc(badgeOf(o))}</span><div class="name">${esc(titleOf(o))}</div>
      <div class="sub">${esc(subOf(o))}</div><div class="itemActions">
      <button class="btn" data-act="edit">Edit</button><button class="btn secondary" data-act="copy">Copy</button>
      <button class="btn danger" data-act="delete">Delete</button></div></div>`;
    card.querySelector('[data-act="edit"]').onclick=()=>openEdit(i);
    card.querySelector('[data-act="copy"]').onclick=()=>copyItem(i);
    card.querySelector('[data-act="delete"]').onclick=()=>deleteItem(i);
    $("list").appendChild(card);
  });
  $("shown").textContent=shown;$("total").textContent=data.length;
  if(!shown)$("list").innerHTML='<div class="card">No items found.</div>';
}
function updateStats(){$("total").textContent=data.length;$("shown").textContent=data.length;$("changes").textContent=changed}
function mark(){changed++;updateStats()}
function addItem(){data.unshift(clone(ds().defaults));mark();render();openEdit(0)}
function copyItem(i){data.splice(i+1,0,clone(data[i]));mark();render()}
function deleteItem(i){if(confirm("Delete this item?")){data.splice(i,1);mark();render()}}
function sortItems(){data.sort((a,b)=>titleOf(a).localeCompare(titleOf(b)));mark();render()}
function priorityKeys(o){
  const map={
    version:["version_code","version_name","title","message","changelog","download_url","update_size","force_update"],
    skins:["id","hero_name","skin_name","image","script","enabled"],
    upgrades:["id","hero","base_name","base_image","backup_script","enabled","targets","skin_tags"],
    suggested:["hero_name","skin_name","image"],
    preparations:["name","image","script","tags","enabled"]
  };
  return [...new Set([...(map[currentKey]||[]),...Object.keys(o)])];
}
function openEdit(i){
  editIndex=i;const o=data[i]||{};$("fields").innerHTML="";$("editTitle").textContent="Edit "+ds().label;
  priorityKeys(o).forEach(k=>addField(k,o[k]!==undefined?o[k]:""));
  updatePreview();$("editModal").classList.remove("hidden");
}
function addField(key,value){
  const type=valueType(value)==="undefined"?"string":valueTy
